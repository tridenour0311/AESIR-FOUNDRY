<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Archive | Aesir Foundry</title>

    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d97706">
<link rel="icon" href="Aesir-Foundry.png">
    <style>
        body {
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 50px;
            background:
                radial-gradient(circle at 0% 50%,
                rgba(255,120,0,.20),
                transparent 30%),

                radial-gradient(circle at 100% 50%,
                rgba(255,120,0,.20),
                transparent 30%),

                radial-gradient(circle at 50% 100%,
                rgba(255,70,0,.15),
                transparent 25%),

                #000;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .logo {
            max-width: 250px;
            width: 100%;
            margin-bottom: 25px;
        }

        h1 {
            color: #d97706;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        p {
            line-height: 1.8;
            font-size: 1.1em;
        }

        .voyage {
            margin-top: 40px;
            font-style: italic;
            color: #999;
        }

        .return-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            border: 2px solid #d97706;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .return-button:hover {
            background: #d97706;
            color: black;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="Aesir-Foundry.png">
    <h1>MORE SAGAS TO COME</h1>

    <p>The archive is still being forged.</p>

    <p>The next saga has yet to be written.</p>

    <div class="voyage">
        The voyage continues.<br>
        The horizon remains unseen.
    </div>

   <a href="index.html" class="return-button">
    Return To The Foundry
</a>

</div>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(() => console.log('Aesir Foundry PWA Ready'))
            .catch(err => console.log(err));
    });
}
</script>

</body>
</html>
