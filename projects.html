<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Archive | Aesir Foundry</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d97706">
    <link rel="icon" href="Aesir-Foundry.png">

    <style>
        body {
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 50px;
            min-height: 100vh;
            background:
                radial-gradient(circle at 0% 50%,
                rgba(255,120,0,.20),
                transparent 30%),

                radial-gradient(circle at 100% 50%,
                rgba(255,120,0,.20),
                transparent 30%),

                radial-gradient(circle at 50% 100%,
                rgba(255,70,0,.15),
                transparent 25%),

                #000;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        .logo {
            max-width: 260px;
            width: 100%;
            height: auto;
            margin-bottom: 35px;
        }

        h1 {
            color: #d97706;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 2.8rem;
            margin-bottom: 45px;
        }

        p {
            line-height: 1.8;
            font-size: 1.15rem;
            margin-bottom: 28px;
        }

        .voyage {
            margin-top: 48px;
            margin-bottom: 35px;
            font-style: italic;
            color: #aaa;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .return-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 26px;
            border: 2px solid #d97706;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .return-button:hover {
            background: #d97706;
            color: black;
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="Aesir-Foundry.png">

        <h1>More Sagas To Come</h1>

        <p>The archive is still being forged.</p>

        <p>The next saga has yet to be written.</p>

        <div class="voyage">
            The voyage continues.<br>
            The horizon remains unseen.
        </div>

        <a href="index.html" class="return-button">
            Return To The Foundry
        </a>

    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('Aesir Foundry PWA Ready'))
                    .catch(err => console.log(err));
            });
        }
    </script>

</body>

</html>
